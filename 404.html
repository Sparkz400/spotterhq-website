<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotterHQ</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0a0f1e">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --bg: #07111f;
            --panel: rgba(255, 255, 255, 0.04);
            --panel-strong: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e5eefb;
            --muted: #8ea0bc;
            --cyan: #38bdf8;
            --indigo: #818cf8;
            --amber: #fbbf24;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 35%),
                radial-gradient(circle at 80% 15%, rgba(129, 140, 248, 0.16), transparent 30%),
                linear-gradient(180deg, #0a1222 0%, #050a14 100%);
        }

        .shell {
            width: min(100%, 760px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 24px 80px var(--shadow);
            overflow: hidden;
        }

        .hero {
            padding: 28px 28px 18px;
            border-bottom: 1px solid var(--border);
            background:
                linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(129, 140, 248, 0.12)),
                transparent;
        }

        .brand {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--cyan), var(--indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(251, 191, 36, 0.14);
            color: var(--amber);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 16px 0 10px;
            font-size: clamp(2rem, 4vw, 3.1rem);
            line-height: 1.05;
            letter-spacing: -0.05em;
        }

        .subtitle {
            margin: 0;
            max-width: 44ch;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.65;
        }

        .content {
            padding: 28px;
        }

        .context-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel);
        }

        .stat-label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 700;
            word-break: break-word;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button-primary {
            color: #08111f;
            background: linear-gradient(135deg, var(--cyan), var(--indigo));
            box-shadow: 0 12px 32px rgba(56, 189, 248, 0.25);
        }

        .button-secondary {
            color: var(--text);
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .notes {
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .notes a {
            color: var(--cyan);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 520px) {
            .hero, .content {
                padding: 22px;
            }

            .actions {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <div class="brand">SpotterHQ</div>
            <div class="eyebrow" id="eyebrow">Open in SpotterHQ</div>
            <h1 id="title">Page not found</h1>
            <p class="subtitle" id="subtitle">
                The page you requested does not exist. Head back to the main site to
                explore SpotterHQ.
            </p>
        </section>

        <section class="content">
            <div class="context-grid hidden" id="contextGrid">
                <div class="stat">
                    <span class="stat-label">Entity</span>
                    <span class="stat-value" id="entityType">Aircraft</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Identifier</span>
                    <span class="stat-value" id="entityId">A1B2C3</span>
                </div>
            </div>

            <div class="actions" id="actions">
                <a class="button button-primary hidden" id="appStoreButton" href="https://apps.apple.com/app/spotterhq">App Store</a>
                <a class="button button-primary" id="playStoreButton" href="https://play.google.com/store/apps/details?id=app.spotterhq">Google Play</a>
                <a class="button button-secondary" href="/">Back to Home</a>
            </div>

            <p class="notes" id="notes">
                If you expected a deep link to open the app, install SpotterHQ and try
                the original link again.
            </p>
        </section>
    </main>

    <script>
        const routePattern = /^\/(?:aircraft|crew|spot|challenge|location)\/[^/]+\/?$/;
        const labels = {
            aircraft: 'Aircraft',
            crew: 'Crew',
            spot: 'Spot',
            challenge: 'Challenge',
            location: 'Location',
        };
        const path = window.location.pathname;
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const notes = document.getElementById('notes');
        const eyebrow = document.getElementById('eyebrow');
        const contextGrid = document.getElementById('contextGrid');
        const entityType = document.getElementById('entityType');
        const entityId = document.getElementById('entityId');
        const appStoreButton = document.getElementById('appStoreButton');

        const iosStoreUrl = 'https://apps.apple.com/app/spotterhq';
        const androidStoreUrl = 'https://play.google.com/store/apps/details?id=app.spotterhq';
        const canShowIosStore = /^https:\/\/apps\.apple\.com\/app\/id\d+/.test(iosStoreUrl);

        if (canShowIosStore) {
            appStoreButton.href = iosStoreUrl;
            appStoreButton.classList.remove('hidden');
        }

        if (routePattern.test(path)) {
            const parts = path.replace(/\/+$/, '').split('/');
            const target = parts[1];
            const id = decodeURIComponent(parts[2] || '');
            const label = labels[target] || 'Link';
            const deepLinkUrl = `app.spotterhq://${target}/${encodeURIComponent(id)}`;
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            document.title = `Open ${label} in SpotterHQ`;
            eyebrow.textContent = 'Open in SpotterHQ';
            title.textContent = `Opening ${label.toLowerCase()} in SpotterHQ`;
            subtitle.textContent = `This ${label.toLowerCase()} link is ready for the mobile app. If the app does not open automatically, use the store button below and then retry the original link.`;
            notes.textContent = `Deep link target: ${label}. If the app is already installed, you can also retry the in-app URL directly: `;
            const inlineLink = document.createElement('a');
            inlineLink.href = deepLinkUrl;
            inlineLink.textContent = deepLinkUrl;
            notes.appendChild(inlineLink);
            notes.appendChild(document.createTextNode('.'));
            contextGrid.classList.remove('hidden');
            entityType.textContent = label;
            entityId.textContent = id;

            if (isMobile) {
                window.setTimeout(() => {
                    window.location.href = deepLinkUrl;
                }, 250);
            }
        } else {
            eyebrow.textContent = '404';
            title.textContent = 'Page not found';
            subtitle.textContent = 'The page you requested does not exist. Head back to the main site to explore SpotterHQ.';
            notes.textContent = 'If you expected a deep link to open the app, double-check the original URL or start again from the homepage.';
        }

        document.getElementById('playStoreButton').href = androidStoreUrl;
    </script>
</body>
</html>
