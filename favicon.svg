<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background circle (radar) -->
  <circle cx="32" cy="32" r="30" fill="#0a0f1e" stroke="url(#g)" stroke-width="2"/>
  <!-- Radar rings -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Crosshairs -->
  <line x1="32" y1="2" x2="32" y2="62" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="2" y1="32" x2="62" y2="32" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Radar sweep -->
  <path d="M32,32 L32,4 A28,28 0 0,1 56,18 Z" fill="#38bdf8" fill-opacity="0.2"/>
  <!-- Aircraft silhouette -->
  <g transform="translate(38,20) rotate(45)" fill="#38bdf8">
    <ellipse cx="0" cy="0" rx="2" ry="6"/>
    <ellipse cx="0" cy="1" rx="8" ry="1.5"/>
    <ellipse cx="0" cy="5" rx="3" ry="1"/>
  </g>
  <!-- Blips -->
  <circle cx="22" cy="24" r="2" fill="#fbbf24" opacity="0.9"/>
  <circle cx="42" cy="42" r="2" fill="#38bdf8" opacity="0.9"/>
</svg>
